name: Go CI

on:
  push:
    branches: [ main, hackathon-final-20260713, feature/**, fix/** ]
    paths:
      - 'internal/**'
      - 'cmd/**'
      - 'scantrace-agent/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/go-ci.yml'
  pull_request:
    branches: [ main, hackathon-final-20260713 ]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build deps (CGO + SQLite)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential libsqlite3-dev pkg-config

      - name: Go environment
        run: |
          go version
          go env
          go mod download

      - name: Build core
        run: CGO_ENABLED=1 go build -v ./internal/...

      - name: Test core
        run: CGO_ENABLED=1 go test -v ./internal/...

      - name: Build scantrace-agent
        working-directory: scantrace-agent
        run: CGO_ENABLED=1 go build -v -o scantrace-agent ./cmd/bot

      - name: Test scantrace-agent
        working-directory: scantrace-agent
        run: CGO_ENABLED=1 go test -v ./...
