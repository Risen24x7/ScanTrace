name: Release (GoReleaser)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g., v0.6.0-rc1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  
      - name: Use GoReleaser config from main (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --no-tags --depth=1 origin main
          git show origin/main:.goreleaser.yaml > .goreleaser.yaml

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build deps (CGO + cross)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential libsqlite3-dev pkg-config gcc-aarch64-linux-gnu

      - name: Go env
        run: go env

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-compile CC for arm64 when CGO is enabled
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CC_aarch64_linux_gnu: aarch64-linux-gnu-gcc
          # Set when running via manual dispatch
          GORELEASER_CURRENT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}
