name: Tag and Release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create (e.g., v0.5.0)'
        required: true
jobs:
  tag_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -a "${{ github.event.inputs.tag }}" -m "ScanTrace ${{ github.event.inputs.tag }}"
          git push origin "${{ github.event.inputs.tag }}"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ScanTrace ${{ github.event.inputs.tag }}
          body_path: .github/release-notes/${{ github.event.inputs.tag }}.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}