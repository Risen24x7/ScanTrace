name: Tag
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create (e.g., v0.6.0-rc1)'
        required: true
permissions:
  contents: write
jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Create tag
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git tag -a "${{ github.event.inputs.tag }}" -m "ScanTrace ${{ github.event.inputs.tag }}"
          git push origin "${{ github.event.inputs.tag }}"
